<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Roller</title>
    <link rel="stylesheet" href="css/roller.css">
</head>
<body>
    <div class="topbar-wrapper">
        <div class="topbar-logo">
            <a class="topbar-logo-link" href="index.html">
                <img src="img/lol-icon.png">
            </a>
            <div class="topbar-roll">
                <div class="circle-half-right"></div>
                <div class="topbar-roll-name">Roll Team</div>
                <div class="triangle-right">
                    <div class="triangle-shape"></div>
                <div class="triangle-border"></div>
                </div>
            </div>
        </div>
        <button id="topbar-options-trigger">
            <i class="icon-menu"></i>
        </button>
    </div>
    <div class="topbar-options">
        <div class="topbar-options-header">Roller Online</div>
        <div class="topbar-option">
            <i class="icon-arrows-cw"></i>
            <div>Roll Team</div>
        </div>
        <div class="topbar-option">
            <i class="icon-pencil"></i>
            <div>Edit Players</div>
        </div>
        <a href="https://github.com/Lankow" class="topbar-option">
            <i class="icon-github-circled"></i>
            <div>GitHub</div>
        </a>
        <div class="topbar-option">
            <i class="icon-help"></i>
            <div>About</div>
        </div>
        <div class="topbar-option">
            <i class="icon-home"></i>
            <div>Home</div>
        </div>
    </div>
    <div class="main-wrapper">
        <div class="main-pick">
            <img class="main-pick-pict" src="img/RandomThumb.jpg" alt="">
            <div class="main-pick-summ">summoner</div>
            <div class="main-pick-name">Unknown</div>
            <div class="main-pick-options"> 
                <div class="main-pick-roll">
                    <div class="roll-name">Reroll</div>
                    <div class="triangle-right">
                        <div class="triangle-shape"></div>
                    <div class="triangle-border"></div>
                    </div>
                </div>
                <div class="main-pick-menu-trigger">
                    <i class="icon-dot-3 trigger"></i>
                    <div class="main-pick-menu">
                        <div class="pick-menu-option menu-option-edit">
                            <i class="icon-pencil"></i>
                            <div>Edit Summoner</div>
                        </div>
                        <div class="pick-menu-option  menu-option-delete">
                            <i class="icon-cancel"></i>
                            <div>Delete Summoner</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <button class="main-add">
            <i class="icon-plus-circle"></i>
            <div>Add Summoner</div>
        </button>
    </div>
    <div class="footer">
        <div>&copy; Copyright 2020 Lankow</div>
    </div>
    <!--JQuery Library-->
    <script src="https://code.jquery.com/jquery-1.11.0.min.js"></script>
    <script src="https://code.jquery.com/jquery-migrate-1.2.1.min.js"></script>

    <script src="js/roller.js"></script>
</body>
</html>
